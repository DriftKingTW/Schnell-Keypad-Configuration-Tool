name: Update firmware from release

# Triggered automatically when the firmware repo publishes a release
# (via repository_dispatch), or manually from the Actions tab to re-pull a
# specific tag. It downloads the release's flashable images, drops them into
# the matching channel folder, regenerates the esp-web-tools manifest and
# commits to master, which makes deploy.yml redeploy GitHub Pages.

on:
  repository_dispatch:
    types: [firmware-released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Firmware release tag (e.g. v1.1.0 or v1.1.0-beta.1)'
        required: true
      prerelease:
        description: 'Publish to the beta channel instead of stable'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FW_REPO: DriftKingTW/Schnell-BLE-Keypad

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Resolve tag and channel
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG='${{ github.event.client_payload.tag }}'
            PRE='${{ github.event.client_payload.prerelease }}'
          else
            TAG='${{ github.event.inputs.tag }}'
            PRE='${{ github.event.inputs.prerelease }}'
          fi
          if [ "$PRE" = "true" ]; then CHANNEL=beta; else CHANNEL=stable; fi
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "erase=$PRE"       >> "$GITHUB_OUTPUT"

      - name: Download firmware assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEST="public/firmware/${{ steps.vars.outputs.channel }}"
          mkdir -p "$DEST"
          gh release download "${{ steps.vars.outputs.tag }}" \
            --repo "$FW_REPO" \
            --pattern firmware-merged.bin \
            --pattern spiffs.bin \
            --dir "$DEST" --clobber
          # esp-web-tools manifest expects this name
          mv "$DEST/firmware-merged.bin" "$DEST/merged-firmware.bin"

      - name: Regenerate manifest
        run: |
          DEST="public/firmware/${{ steps.vars.outputs.channel }}"
          jq -n \
            --arg version "${{ steps.vars.outputs.tag }}" \
            --argjson erase ${{ steps.vars.outputs.erase }} \
            '{
              name: "Schnell Keypad Firmware",
              version: $version,
              start_url: "/Schnell-Keypad-Configuration-Tool/",
              new_install_improv_wait_time: 10,
              builds: [
                {
                  chipFamily: "ESP32-S3",
                  parts: [
                    { path: "merged-firmware.bin", offset: "0x0" },
                    { path: "spiffs.bin", offset: "0x210000" }
                  ]
                }
              ]
            } + (if $erase then { new_install_prompt_erase: true } else {} end)' \
            > "$DEST/manifest.json"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/firmware
          if git diff --cached --quiet; then
            echo "No firmware changes to commit."
            exit 0
          fi
          git commit -m "chore: update ${{ steps.vars.outputs.channel }} firmware to ${{ steps.vars.outputs.tag }}"
          git push

  # The commit above is pushed with GITHUB_TOKEN, which does not re-trigger
  # deploy.yml's push event, so deploy it explicitly here.
  deploy:
    needs: update
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
